<!DOCTYPE html>
<html lang="en" data-page="inventory" data-role="pharmacist">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaSys | Inventory Monitoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="dashboard-body">
  <div id="appShell"></div>
  <main class="main-content">
    <div class="container-fluid p-4 p-lg-5">
      <div class="page-header mb-4 d-flex flex-wrap gap-3 justify-content-between align-items-center">
        <div>
          <span class="eyebrow">Inventory Monitoring</span>
          <h1 class="fw-bold mt-2 mb-1">Stock health and expiration overview</h1>
          <p class="text-muted mb-0">Track medicine levels with clear status badges and reorder recommendations.</p>
        </div>
        <button class="btn btn-success rounded-pill px-4"><i class="bi bi-arrow-repeat me-2"></i>Run Stock Audit</button>
      </div>
      <div class="row g-4">
        <div class="col-xl-8">
          <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table modern-table align-middle mb-0" id="inventoryTable"></table>
              </div>
            </div>
          </div>
        </div>
        <div class="col-xl-4">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-1">Inventory Alerts Widget</h5>
              <p class="text-muted mb-4">Priority issues requiring attention</p>
              <div id="inventoryAlerts" class="d-grid gap-3"></div>
            </div>
          </div>
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-1">Reorder Recommendations</h5>
              <p class="text-muted mb-4">Suggested replenishment list</p>
              <div id="reorderRecommendations" class="d-grid gap-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
