<!DOCTYPE html>
<html lang="en" data-page="products" data-role="admin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaSys | Product Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body class="dashboard-body">
  <div id="appShell"></div>
  <main class="main-content">
    <div class="container-fluid p-4 p-lg-5">
      <div class="page-header d-flex flex-wrap gap-3 justify-content-between align-items-center mb-4">
        <div>
          <span class="eyebrow">Product Catalog</span>
          <h1 class="fw-bold mt-2 mb-1">Manage medicine records and pricing</h1>
          <p class="text-muted mb-0">Add, search, edit, and archive products using modal-based interactions.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <div class="input-group search-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control border-start-0" id="productSearch" placeholder="Search product or barcode">
          </div>
          <button id="addProductBtn" class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#productModal"><i class="bi bi-plus-circle me-2"></i>Add Product</button>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table modern-table align-middle mb-0" id="productsTable"></table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 rounded-4">
        <div class="modal-header border-0 pb-0">
          <div>
            <h5 class="modal-title fw-bold" id="productModalTitle">Add Product</h5>
            <p class="text-muted mb-0" id="productFormCaption">Create a new medicine record in the catalog.</p>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-3">
          <form class="row g-3" id="productForm">
            <input type="hidden" id="productIdInput">
            <div class="col-md-6">
              <label class="form-label" for="productNameInput">Product Name</label>
              <input id="productNameInput" class="form-control" placeholder="Paracetamol">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="barcodeInput">Barcode</label>
              <input id="barcodeInput" class="form-control" placeholder="PHS-1001">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="priceInput">Price</label>
              <input id="priceInput" type="number" min="0" step="0.01" class="form-control" placeholder="16.00">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="stockInput">Stock</label>
              <input id="stockInput" type="number" min="0" step="1" class="form-control" placeholder="120">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="expirationInput">Expiration</label>
              <input id="expirationInput" type="date" class="form-control">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="shelfInput">Shelf Location</label>
              <input id="shelfInput" class="form-control" placeholder="A1-02">
            </div>
            <div class="col-12">
              <label class="form-label" for="typeInput">Product Type</label>
              <select id="typeInput" class="form-select">
                <option value="OTC">OTC</option>
                <option value="RX">RX</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary rounded-pill" id="saveProductBtn">Save Product</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
