<!DOCTYPE html>
<html lang="en" data-page="reorder" data-role="admin">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaSys | Reorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="dashboard-body">
  <div id="appShell"></div>
  <main class="main-content">
    <div class="container-fluid p-4 p-lg-5">
      <div class="page-header mb-4">
        <span class="eyebrow">Reorder Management</span>
        <h1 class="fw-bold mt-2 mb-1">Low stock and critical replenishment queue</h1>
        <p class="text-muted mb-0">Review stock warnings and generate reorder requests for supplier processing simulation.</p>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-transparent border-0 p-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
          <div>
            <h5 class="fw-bold mb-1">Reorder Recommendations</h5>
            <p class="text-muted mb-0">Critical items are highlighted for urgent ordering.</p>
          </div>
          <button class="btn btn-primary rounded-pill" onclick="alert('Bulk reorder simulation complete.')">
            <i class="bi bi-send-check me-2"></i>Submit All Suggested Reorders
          </button>
        </div>
        <div class="card-body pt-0 px-4 pb-4">
          <div class="table-responsive">
            <table class="table modern-table align-middle" id="reorderTable"></table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
